<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags cruciais para Mobile First e Web Apps -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Portal do Cliente | Estúdio de Design</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a',
                        },
                        dark: {
                            900: '#09090b', 800: '#18181b', 700: '#27272a',
                        }
                    },
                    spacing: {
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #f4f4f5;
            -webkit-font-smoothing: antialiased;
            /* Evita pull-to-refresh acidental no mobile */
            overscroll-behavior-y: none;
        }
        
        .glass-panel {
            background: rgba(24, 24, 27, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Ajuste nativo para navegadores mobile (Safe Area) */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
        .pt-safe { padding-top: env(safe-area-inset-top); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gradient-placeholder-1 { background: linear-gradient(135deg, #38bdf8, #818cf8); }

        /* Sistema de Toasts Otimizado para Mobile */
        #toast-container {
            position: fixed;
            bottom: max(80px, calc(80px + env(safe-area-inset-bottom))); /* Acima da barra de navegação */
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 400px;
            pointer-events: none; /* Deixa clicar através do container */
        }
        .toast {
            background: #18181b;
            border: 1px solid #27272a;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast.fade-out { animation: fadeOutDown 0.3s forwards; }
        @keyframes fadeOutDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
    </style>
</head>
<body class="overflow-x-hidden selection:bg-brand-500 selection:text-white">

    <div id="app" class="min-h-[100dvh] w-full flex flex-col md:flex-row pt-safe"></div>
    <div id="toast-container"></div>

    <!-- MUDANÇA AQUI: Adicionado type="module" -->
    <script type="module">
        // Importando módulos do Firebase via CDN oficial
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Sua configuração real do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDUWJKs_LspaznsFak_WsSmYNQobNBiflU",
            authDomain: "members-b4a99.firebaseapp.com",
            projectId: "members-b4a99",
            storageBucket: "members-b4a99.firebasestorage.app",
            messagingSenderId: "220098403439",
            appId: "1:220098403439:web:f4bb423d098caca887c19a",
            measurementId: "G-G7CQ4XWRYL"
        };

        // Inicializar o Firebase
        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp); // Pronto para futuras integrações de dados

        // Estado do projeto (misturando Auth real com dados mocados por enquanto)
        const state = {
            isLoggedIn: false,
            currentTab: 'dashboard',
            user: { name: "Cliente", company: "", email: "" },
            project: {
                name: "Identidade Visual",
                deadline: "15/05/2026",
                progress: 65,
                currentStage: 2,
                stages: ["Briefing", "Conceitos", "Ajustes", "Arquivos"]
            }
        };

        // Monitorar o status de login do usuário em tempo real
        onAuthStateChanged(auth, (user) => {
            if (user) {
                state.isLoggedIn = true;
                state.user.email = user.email;
                // Exemplo: usar a parte do e-mail antes do @ como "Nome" provisório
                state.user.name = user.email.split('@')[0];
                window.renderApp();
            } else {
                state.isLoggedIn = false;
                window.renderApp();
            }
        });

        // Como usamos type="module", precisamos anexar as funções no 'window' 
        // para que o HTML consiga acessá-las pelos onclicks.
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-brand-500 text-2xl"></i>' : (type === 'error' ? '<i class="ph-fill ph-warning-circle text-red-500 text-2xl"></i>' : '<i class="ph-fill ph-info text-blue-500 text-2xl"></i>');
            toast.className = 'toast w-full';
            toast.innerHTML = `${icon} <span class="font-medium text-sm flex-1">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.renderApp = function() {
            const app = document.getElementById('app');
            if (!state.isLoggedIn) {
                app.innerHTML = getLoginTemplate();
                setupLoginListeners();
            } else {
                app.innerHTML = getDashboardTemplate();
                renderMainContent();
            }
        }

        function getLoginTemplate() {
            return `
                <div class="flex-1 flex items-center justify-center p-4 relative w-full min-h-[100dvh]">
                    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
                        <div class="absolute -top-[10%] -right-[20%] w-[80%] h-[60%] rounded-full bg-brand-900/20 blur-[100px]"></div>
                        <div class="absolute -bottom-[10%] -left-[20%] w-[80%] h-[60%] rounded-full bg-indigo-900/20 blur-[100px]"></div>
                    </div>

                    <div class="glass-panel w-full max-w-md p-6 sm:p-8 rounded-3xl z-10 fade-in shadow-2xl">
                        <div class="text-center mb-8 sm:mb-10">
                            <div class="w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-tr from-brand-500 to-indigo-500 rounded-2xl mx-auto mb-5 flex items-center justify-center shadow-lg shadow-brand-500/30">
                                <i class="ph ph-bezier-curve text-white text-2xl sm:text-3xl"></i>
                            </div>
                            <h1 class="text-xl sm:text-2xl font-bold text-white tracking-tight">Portal do Cliente</h1>
                            <p class="text-zinc-400 text-xs sm:text-sm mt-2">Acesse os arquivos do seu projeto.</p>
                        </div>

                        <form id="login-form" class="space-y-4 sm:space-y-5">
                            <div>
                                <label class="block text-xs sm:text-sm font-medium text-zinc-400 mb-1.5">E-mail de acesso</label>
                                <div class="relative">
                                    <i class="ph ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-lg"></i>
                                    <input type="email" id="email-input" placeholder="seuemail@empresa.com" class="w-full bg-dark-900/80 border border-dark-700 text-white rounded-xl py-3.5 sm:py-3 pl-11 pr-4 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all text-sm" required>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs sm:text-sm font-medium text-zinc-400 mb-1.5">Senha</label>
                                <div class="relative">
                                    <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-lg"></i>
                                    <input type="password" id="password-input" placeholder="Sua senha" class="w-full bg-dark-900/80 border border-dark-700 text-white rounded-xl py-3.5 sm:py-3 pl-11 pr-4 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all text-sm" required>
                                </div>
                            </div>
                            
                            <button type="submit" id="btn-login" class="w-full bg-brand-500 text-white font-medium py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-brand-500/25 flex items-center justify-center gap-2 mt-2 sm:mt-4 text-sm sm:text-base">
                                Entrar na Área Segura <i class="ph ph-arrow-right font-bold"></i>
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function setupLoginListeners() {
            const form = document.getElementById('login-form');
            if(form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const email = document.getElementById('email-input').value;
                    const password = document.getElementById('password-input').value;
                    const btn = document.getElementById('btn-login');
                    
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Autenticando...';
                    btn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-95');
                    
                    try {
                        // Chama o Firebase Auth
                        await signInWithEmailAndPassword(auth, email, password);
                        window.showToast('Acesso liberado!', 'success');
                        // Não precisamos chamar renderApp aqui, o onAuthStateChanged detecta e renderiza.
                    } catch (error) {
                        btn.innerHTML = originalText;
                        btn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-95');
                        
                        console.error("Erro Firebase Auth:", error.code);
                        if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                            window.showToast('E-mail ou senha incorretos.', 'error');
                        } else {
                            window.showToast('Erro ao fazer login. Tente novamente.', 'error');
                        }
                    }
                });
            }
        }

        window.changeTab = function(tabId) {
            if(state.currentTab === tabId) return;
            state.currentTab = tabId;
            window.renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.logout = async function() {
            try {
                await signOut(auth);
                window.showToast('Você saiu da conta.', 'info');
            } catch (error) {
                window.showToast('Erro ao sair da conta.', 'error');
            }
        }

        window.verConceito = function() {
            window.showToast('Simulação: Abrindo galeria em tela cheia...', 'info');
        }

        function getDashboardTemplate() {
            return `
                <nav class="fixed bottom-0 w-full md:w-64 md:h-[100dvh] glass-panel md:border-r md:border-t-0 border-t border-dark-700 z-50 flex flex-row md:flex-col justify-between md:justify-start pb-safe md:pb-0">
                    <div class="hidden md:flex items-center gap-3 p-6 border-b border-dark-700">
                        <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                            <i class="ph ph-bezier-curve text-white text-xl"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm text-white leading-tight uppercase tracking-widest">Estúdio</p>
                            <p class="text-[10px] text-brand-500 font-bold uppercase">Área VIP</p>
                        </div>
                    </div>

                    <div class="flex flex-row md:flex-col w-full px-1 py-1 md:px-4 md:py-6 gap-1 md:gap-2">
                        ${getNavButton('dashboard', 'Visão Geral', 'ph-squares-four')}
                        ${getNavButton('arquivos', 'Arquivos', 'ph-folder')}
                        ${getNavButton('revisoes', 'Revisões', 'ph-chats-circle')}
                    </div>

                    <div class="hidden md:block mt-auto p-4 border-t border-dark-700">
                        <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-dark-800 transition-colors cursor-pointer group" onclick="window.logout()">
                            <div class="w-9 h-9 rounded-full bg-dark-900 border border-dark-700 flex items-center justify-center group-hover:border-brand-500 transition-colors">
                                <span class="text-xs font-bold text-zinc-300 group-hover:text-brand-500">${state.user.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <p class="text-sm font-medium text-white truncate">${state.user.name}</p>
                                <p class="text-xs text-zinc-500 truncate group-hover:text-red-400 transition-colors">Sair da conta</p>
                            </div>
                            <i class="ph ph-sign-out text-zinc-500 group-hover:text-red-400"></i>
                        </div>
                    </div>
                </nav>

                <main class="flex-1 md:ml-64 w-full min-h-[100dvh] flex flex-col bg-dark-900 relative">
                    <header class="h-16 md:h-20 border-b border-dark-700 px-4 md:px-8 flex items-center justify-between sticky top-0 bg-dark-900/90 backdrop-blur-lg z-40">
                        <div class="flex items-center gap-3 md:hidden" onclick="window.logout()">
                             <div class="w-8 h-8 rounded-full bg-dark-800 border border-dark-700 flex items-center justify-center">
                                <span class="text-[10px] font-bold text-zinc-300">${state.user.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-xs font-semibold text-white leading-tight">Olá, ${state.user.name.split('.')[0]}</span>
                                <span class="text-[10px] text-red-400">Sair</span>
                            </div>
                        </div>
                        
                        <div class="hidden md:block">
                            <h2 class="text-xl font-bold text-white tracking-tight" id="header-title-desk">Visão Geral</h2>
                            <p class="text-xs text-zinc-400 mt-0.5">Acompanhe a evolução do seu projeto.</p>
                        </div>

                        <div class="flex items-center gap-2 md:gap-4">
                            <button onclick="window.showToast('Sem novas notificações.')" class="w-10 h-10 rounded-full bg-dark-800 md:bg-transparent border border-transparent md:border-dark-700 flex items-center justify-center text-zinc-400 hover:text-white active:scale-90 transition-all relative">
                                <i class="ph ph-bell text-lg"></i>
                                <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-brand-500 rounded-full border border-dark-800"></span>
                            </button>
                            <a href="#" class="flex items-center justify-center gap-2 text-sm font-medium text-white bg-brand-500/10 hover:bg-brand-500/20 px-3 md:px-4 py-2 md:py-2.5 rounded-full border border-brand-500/20 active:scale-95 transition-all">
                                <i class="ph-fill ph-whatsapp-logo text-brand-500 text-lg"></i>
                                <span class="hidden md:block text-brand-500">Falar com Designer</span>
                            </a>
                        </div>
                    </header>

                    <div id="main-content" class="p-4 md:p-8 max-w-6xl mx-auto w-full flex-1 pb-24 md:pb-8 fade-in"></div>
                </main>
            `;
        }

        function getNavButton(id, label, icon) {
            const isActive = state.currentTab === id;
            const baseClass = "flex-1 md:flex-none flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 py-2 md:py-3.5 px-1 md:px-4 rounded-xl transition-all md:w-full select-none";
            const activeClass = isActive ? "text-brand-500 bg-brand-500/10 md:border md:border-brand-500/20" : "text-zinc-500 hover:text-zinc-300 active:bg-dark-800";
            const iconClass = isActive ? "ph-fill" : "";

            return `
                <button onclick="window.changeTab('${id}')" class="${baseClass} ${activeClass}">
                    <i class="ph ${icon} text-[22px] md:text-xl ${iconClass}"></i>
                    <span class="text-[10px] md:text-sm font-medium md:font-semibold leading-none">${label}</span>
                </button>
            `;
        }

        function renderMainContent() {
            const container = document.getElementById('main-content');
            const headerTitleDesk = document.getElementById('header-title-desk');
            
            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            const titles = {
                'dashboard': 'Visão Geral do Projeto',
                'arquivos': 'Meus Arquivos',
                'revisoes': 'Centro de Revisões'
            };
            
            if(headerTitleDesk) headerTitleDesk.innerText = titles[state.currentTab];

            let mobileTitleHTML = `<h2 class="text-xl font-bold text-white mb-4 md:hidden">${titles[state.currentTab]}</h2>`;

            switch(state.currentTab) {
                case 'dashboard': container.innerHTML = mobileTitleHTML + getOverviewContent(); break;
                case 'arquivos': container.innerHTML = mobileTitleHTML + getFilesContent(); break;
                case 'revisoes': container.innerHTML = mobileTitleHTML + `<div class="text-center py-16 md:py-24 px-4 bg-dark-800/30 rounded-2xl border border-dark-700/50"><i class="ph ph-paint-brush text-5xl md:text-6xl text-zinc-700 mb-4"></i><h3 class="text-lg md:text-xl text-white font-medium mb-2">Sem revisões pendentes</h3><p class="text-sm text-zinc-400 max-w-sm mx-auto">Sua etapa atual está aguardando ação na aba Visão Geral.</p></div>`; break;
            }
        }

        function getOverviewContent() {
            let placeholdersImagens = '';
            for(let i = 1; i <= 24; i++) {
                placeholdersImagens += `
                    <div class="glass-panel border border-dark-700 rounded-xl overflow-hidden group cursor-pointer aspect-square relative transition-transform hover:scale-[1.02]" onclick="window.verConceito()">
                        <div class="absolute inset-0 bg-dark-800 flex items-center justify-center">
                            <i class="ph ph-image text-3xl text-dark-700"></i>
                        </div>
                        <div class="absolute inset-0 flex items-end p-2 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="text-[10px] md:text-xs text-white font-medium">Imagem ${i}</span>
                        </div>
                        <div class="absolute top-2 right-2 w-6 h-6 rounded-full bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="ph ph-arrows-out text-white text-xs"></i>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="glass-panel rounded-2xl md:rounded-3xl p-5 md:p-8 mb-6 md:mb-8 border border-dark-700 relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-48 h-48 bg-brand-500/10 rounded-full blur-3xl pointer-events-none"></div>
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-8 relative z-10">
                        <div class="w-full">
                            <div class="flex items-center justify-between md:justify-start gap-3 mb-2 md:mb-3">
                                <span class="px-2.5 py-1 rounded-md bg-brand-500/15 border border-brand-500/30 text-brand-500 text-[10px] font-bold uppercase tracking-wider">Ativo</span>
                                <span class="md:hidden text-xs text-zinc-400 font-medium">Prazo: ${state.project.deadline}</span>
                            </div>
                            <h3 class="text-xl md:text-3xl font-bold text-white tracking-tight mb-1">${state.project.name}</h3>
                            <p class="hidden md:flex text-sm text-zinc-400 items-center gap-1.5"><i class="ph ph-calendar-blank"></i> Prazo estimado: <span class="text-zinc-200 font-medium">${state.project.deadline}</span></p>
                        </div>
                        <div class="w-full md:w-auto md:text-right bg-dark-900 md:bg-transparent p-4 md:p-0 rounded-xl md:rounded-none border border-dark-700 md:border-none">
                            <div class="flex justify-between md:justify-end items-center mb-2 md:mb-1.5">
                                <p class="text-xs md:text-sm text-zinc-400 font-medium">Progresso Geral</p>
                                <span class="text-sm md:text-base text-white font-bold md:hidden">${state.project.progress}%</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-full md:w-48 h-2 bg-dark-800 rounded-full overflow-hidden border border-dark-700">
                                    <div class="h-full bg-brand-500 rounded-full w-[${state.project.progress}%] shadow-[0_0_10px_rgba(20,184,166,0.6)]"></div>
                                </div>
                                <span class="hidden md:block text-white font-bold">${state.project.progress}%</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between items-start relative z-10 px-1">
                        <div class="absolute top-[14px] md:top-5 left-[10%] right-[10%] h-[2px] bg-dark-700 -z-10"></div>
                        <div class="absolute top-[14px] md:top-5 left-[10%] w-[50%] h-[2px] bg-brand-500 -z-10 shadow-[0_0_8px_rgba(20,184,166,0.8)]"></div>
                        ${state.project.stages.map((stage, index) => {
                            let isPast = index < state.project.currentStage;
                            let isCurrent = index === state.project.currentStage;
                            let bgClass = isPast ? "bg-brand-500/20 border-brand-500 text-brand-500" : isCurrent ? "bg-brand-500 border-brand-500 text-white shadow-[0_0_15px_rgba(20,184,166,0.4)]" : "bg-dark-900 border-dark-700 text-zinc-600";
                            let icon = isPast ? "ph-check" : isCurrent ? "ph-spinner-gap animate-spin" : "ph-circle";
                            let textClass = (isPast || isCurrent) ? "text-zinc-200 font-semibold" : "text-zinc-500 font-medium";
                            return `
                                <div class="flex flex-col items-center gap-1.5 md:gap-2 relative bg-transparent w-16 md:w-24">
                                    <div class="w-7 h-7 md:w-10 md:h-10 rounded-full border-2 flex items-center justify-center bg-dark-800 transition-all ${bgClass}">
                                        <i class="ph ${icon} text-sm md:text-lg ${isPast ? 'ph-fill' : ''}"></i>
                                    </div>
                                    <span class="text-[9px] md:text-xs text-center uppercase tracking-wider break-words w-full ${textClass}">${stage}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div class="mb-4">
                    <div class="flex items-center justify-between mb-4 md:mb-6">
                        <h4 class="text-base md:text-lg font-bold text-white flex items-center gap-2"><i class="ph-fill ph-presentation-chart text-brand-500"></i> Apresentação do Projeto</h4>

                    </div>
                    <p class="text-sm text-zinc-400 mb-6">Confira abaixo todos os entregáveis e aplicações criadas para a sua nova marca. Role até o final para aprovar.</p>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4 mb-10">

                    </div>
                    <div class="border border-brand-500/30 rounded-2xl md:rounded-3xl p-6 md:p-10 flex flex-col items-center justify-center text-center bg-brand-500/5 mt-8 shadow-lg">

                        <h5 class="font-bold text-white text-lg md:text-xl mb-2">O que achou do resultado?</h5>
                        <p class="text-sm md:text-base text-zinc-400 mb-8 max-w-md">Após visualizar todos os itens acima, caso o projeto atenda às suas expectativas, clique em aprovar para iniciarmos a preparação dos seus arquivos finais.</p>
                        <div class="flex flex-col sm:flex-row gap-3 md:gap-4 w-full max-w-lg justify-center">
                            <button onclick="window.showToast('Aprovado! Preparando arquivos finais.', 'success')" class="w-full sm:w-auto px-8 py-4 bg-brand-500 text-white text-sm md:text-base font-bold rounded-xl active:scale-95 transition-all shadow-[0_0_20px_rgba(20,184,166,0.3)] hover:shadow-[0_0_30px_rgba(20,184,166,0.5)] flex items-center justify-center gap-2">
                                <i class="ph ph-check-circle text-xl"></i> Aprovar Projeto
                            </button>
                            <button onclick="window.changeTab('revisoes')" class="w-full sm:w-auto px-8 py-4 bg-dark-800 text-white text-sm md:text-base font-semibold rounded-xl active:scale-95 transition-all border border-dark-600 hover:bg-dark-700 flex items-center justify-center gap-2">
                                <i class="ph ph-pencil-simple text-xl"></i> Solicitar Ajuste
                            </button>
                        </div>
                    </div>
                </div>
            `;

        function getFilesContent() {
            const files = [
                { name: "Logo_Principal.ai", size: "2.4 MB", ext: "AI", icon: "ph-bezier-curve", color: "text-orange-500", bg: "bg-orange-500/10", available: false },
                { name: "PNGs_Alta_Res.zip", size: "18.5 MB", ext: "ZIP", icon: "ph-file-archive", color: "text-blue-500", bg: "bg-blue-500/10", available: false },
                { name: "Manual_Marca.pdf", size: "12.1 MB", ext: "PDF", icon: "ph-file-pdf", color: "text-red-500", bg: "bg-red-500/10", available: false },
                { name: "Apresentacao_v1.pdf", size: "8.4 MB", ext: "PDF", icon: "ph-file-pdf", color: "text-red-500", bg: "bg-red-500/10", available: true },
            ];

            return `
                <div class="glass-panel border border-dark-700 rounded-2xl md:rounded-3xl p-1 mb-6 overflow-hidden">
                    <div class="p-4 md:p-8 bg-dark-900 rounded-[12px] md:rounded-[22px]">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <div>
                                <h3 class="text-lg md:text-xl font-bold text-white mb-0.5">Pacote de Entrega</h3>
                                <p class="text-xs md:text-sm text-zinc-400">Arquivos finais liberados após aprovação.</p>
                            </div>
                            <button class="w-full md:w-auto bg-dark-800 border border-dark-700 text-zinc-400 px-4 py-3 rounded-xl text-sm font-medium flex items-center justify-center gap-2 opacity-60 cursor-not-allowed">
                                <i class="ph ph-download-simple text-lg"></i> Baixar Tudo
                            </button>
                        </div>
                        <div class="flex flex-col gap-2.5">
                            ${files.map(file => `
                                <div class="flex items-center justify-between p-3 md:p-4 rounded-xl border border-dark-700 bg-dark-800/40 ${file.available ? 'active:bg-dark-800 cursor-pointer' : 'opacity-60'} transition-colors" onclick="${file.available ? 'window.showToast(\'Download iniciado.\')' : 'window.showToast(\'Bloqueado na fase atual.\', \'info\')'}">
                                    <div class="flex items-center gap-3 md:gap-4 overflow-hidden">
                                        <div class="shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-lg ${file.bg} flex items-center justify-center">
                                            <i class="ph-fill ${file.icon} text-xl md:text-2xl ${file.color}"></i>
                                        </div>
                                        <div class="min-w-0">
                                            <p class="font-semibold text-sm md:text-base text-zinc-200 truncate pr-2">${file.name}</p>
                                            <div class="flex items-center gap-2 text-[10px] md:text-xs mt-0.5">
                                                <span class="text-zinc-500 font-medium">${file.size}</span>
                                                <span class="w-1 h-1 rounded-full bg-dark-600"></span>
                                                ${file.available ? '<span class="text-brand-500 font-semibold flex items-center gap-1"><i class="ph-fill ph-check-circle"></i> Liberado</span>' : '<span class="text-zinc-500 flex items-center gap-1"><i class="ph-fill ph-lock-key"></i> Bloqueado</span>'}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="shrink-0 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center ${file.available ? 'bg-dark-700 text-white' : 'text-zinc-600'}">
                                        <i class="ph ${file.available ? 'ph-download-simple' : 'ph-lock-key'} text-base md:text-lg"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
