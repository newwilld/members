<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc"> <!-- Adaptável via JS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Portal do Cliente | Estúdio de Design</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a',
                        },
                        dark: {
                            900: '#09090b', 800: '#18181b', 700: '#27272a', 600: '#3f3f46'
                        }
                    },
                    spacing: {
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fafafa;
            color: #18181b;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .dark .glass-panel {
            background: rgba(24, 24, 27, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }

        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
        .pt-safe { padding-top: env(safe-area-inset-top); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #toast-container {
            position: fixed;
            bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }
        .toast {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            color: #18181b;
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }
        .dark .toast {
            background: #18181b;
            border: 1px solid #27272a;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.8);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast.fade-out { animation: fadeOutDown 0.3s forwards; }
        @keyframes fadeOutDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
    </style>
</head>
<body class="overflow-x-hidden bg-zinc-50 dark:bg-dark-900 text-zinc-900 dark:text-zinc-100 selection:bg-brand-500 selection:text-white transition-colors duration-300">

    <div id="app" class="min-h-[100dvh] w-full flex flex-col md:flex-row pt-safe"></div>
    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUWJKs_LspaznsFak_WsSmYNQobNBiflU",
            authDomain: "members-b4a99.firebaseapp.com",
            projectId: "members-b4a99",
            storageBucket: "members-b4a99.firebasestorage.app",
            messagingSenderId: "220098403439",
            appId: "1:220098403439:web:f4bb423d098caca887c19a",
            measurementId: "G-G7CQ4XWRYL"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const storage = getStorage(firebaseApp);

        // DEFINA AQUI O E-MAIL DO ADMINISTRADOR
        const ADMIN_EMAIL = "admin@empresa.com"; 

        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#09090b');
        }

        const state = {
            isLoggedIn: false,
            isAdmin: false,
            currentTab: 'dashboard',
            theme: savedTheme,
            user: { name: "", email: "" },
            project: {
                name: "Identidade Visual",
                deadline: "15/05/2026",
                progress: 65,
                currentStage: 2,
                stages: ["Briefing", "Conceitos", "Ajustes", "Arquivos"],
                images: [] // Array dinâmico que receberá as imagens reais
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                state.isLoggedIn = true;
                state.user.email = user.email;
                state.user.name = user.email.split('@')[0];
                state.isAdmin = (user.email === ADMIN_EMAIL);
                
                // Se for cliente, tenta buscar as imagens dele no banco de dados (Simulação de fetch)
                // Se fosse buscar real: await buscarImagensDoFirestore(user.email);
                
                window.renderApp();
            } else {
                state.isLoggedIn = false;
                state.isAdmin = false;
                state.project.images = [];
                window.renderApp();
            }
        });

        window.toggleTheme = function() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', state.theme);
            
            if (state.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#09090b');
            } else {
                document.documentElement.classList.remove('dark');
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#fafafa');
            }
            window.renderApp(); 
        }

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-brand-500 text-2xl"></i>' : (type === 'error' ? '<i class="ph-fill ph-warning-circle text-red-500 text-2xl"></i>' : '<i class="ph-fill ph-info text-blue-500 text-2xl"></i>');
            toast.className = 'toast w-full';
            toast.innerHTML = `${icon} <span class="font-medium text-sm flex-1">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.renderApp = function() {
            const app = document.getElementById('app');
            if (!state.isLoggedIn) {
                app.innerHTML = getLoginTemplate();
                setupLoginListeners();
            } else {
                app.innerHTML = getDashboardTemplate();
                renderMainContent();
            }
        }

        function getLoginTemplate() {
            const themeIcon = state.theme === 'light' ? 'ph-moon' : 'ph-sun';
            
            return `
                <div class="flex-1 flex items-center justify-center p-4 relative w-full min-h-[100dvh]">
                    <button onclick="window.toggleTheme()" class="absolute top-4 right-4 md:top-8 md:right-8 w-12 h-12 rounded-full glass-panel flex items-center justify-center text-zinc-600 dark:text-zinc-400 hover:text-brand-500 transition-colors z-20 shadow-sm">
                        <i class="ph-fill ${themeIcon} text-xl"></i>
                    </button>

                    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
                        <div class="absolute -top-[10%] -right-[20%] w-[80%] h-[60%] rounded-full bg-brand-200/50 dark:bg-brand-900/20 blur-[100px] transition-colors"></div>
                        <div class="absolute -bottom-[10%] -left-[20%] w-[80%] h-[60%] rounded-full bg-indigo-200/50 dark:bg-indigo-900/20 blur-[100px] transition-colors"></div>
                    </div>

                    <div class="glass-panel w-full max-w-md p-6 sm:p-8 rounded-3xl z-10 fade-in">
                        <div class="text-center mb-8 sm:mb-10">
                            <div class="w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-tr from-brand-500 to-indigo-500 rounded-2xl mx-auto mb-5 flex items-center justify-center shadow-lg shadow-brand-500/30">
                                <i class="ph ph-bezier-curve text-white text-2xl sm:text-3xl"></i>
                            </div>
                            <h1 class="text-xl sm:text-2xl font-bold text-zinc-900 dark:text-white tracking-tight">Portal do Cliente</h1>
                            <p class="text-zinc-500 dark:text-zinc-400 text-xs sm:text-sm mt-2">Acesse com o e-mail do cliente ou <br/><span class="font-medium text-brand-500">${ADMIN_EMAIL}</span> para administrar.</p>
                        </div>

                        <form id="login-form" class="space-y-4 sm:space-y-5">
                            <div>
                                <label class="block text-xs sm:text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">E-mail de acesso</label>
                                <div class="relative">
                                    <i class="ph ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 dark:text-zinc-500 text-lg"></i>
                                    <input type="email" id="email-input" placeholder="seuemail@empresa.com" class="w-full bg-white dark:bg-dark-900/80 border border-zinc-200 dark:border-dark-700 text-zinc-900 dark:text-white rounded-xl py-3.5 sm:py-3 pl-11 pr-4 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all text-sm shadow-sm dark:shadow-none" required>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs sm:text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">Senha</label>
                                <div class="relative">
                                    <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 dark:text-zinc-500 text-lg"></i>
                                    <input type="password" id="password-input" placeholder="Sua senha" class="w-full bg-white dark:bg-dark-900/80 border border-zinc-200 dark:border-dark-700 text-zinc-900 dark:text-white rounded-xl py-3.5 sm:py-3 pl-11 pr-4 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all text-sm shadow-sm dark:shadow-none" required>
                                </div>
                            </div>
                            
                            <button type="submit" id="btn-login" class="w-full bg-brand-500 text-white font-medium py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-brand-500/25 flex items-center justify-center gap-2 mt-2 sm:mt-4 text-sm sm:text-base hover:bg-brand-600">
                                Entrar no Portal <i class="ph ph-arrow-right font-bold"></i>
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function setupLoginListeners() {
            const form = document.getElementById('login-form');
            if(form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const email = document.getElementById('email-input').value;
                    const password = document.getElementById('password-input').value;
                    const btn = document.getElementById('btn-login');
                    
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Autenticando...';
                    btn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-95');
                    
                    try {
                        await signInWithEmailAndPassword(auth, email, password);
                        window.showToast('Acesso liberado!', 'success');
                    } catch (error) {
                        btn.innerHTML = originalText;
                        btn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-95');
                        
                        if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                            window.showToast('E-mail ou senha incorretos.', 'error');
                        } else {
                            window.showToast('Erro ao fazer login. Tente novamente.', 'error');
                        }
                    }
                });
            }
        }

        window.changeTab = function(tabId) {
            if(state.currentTab === tabId) return;
            state.currentTab = tabId;
            window.renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.logout = async function() {
            try {
                await signOut(auth);
                window.showToast('Você saiu da conta.', 'info');
            } catch (error) {
                window.showToast('Erro ao sair da conta.', 'error');
            }
        }

        window.verConceitoFull = function(url) {
            // Expande a imagem clicada
            const container = document.getElementById('toast-container');
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[999] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 cursor-pointer fade-in";
            modal.innerHTML = `<img src="${url}" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl"><div class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20 transition-colors"><i class="ph ph-x text-xl"></i></div>`;
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }

        // === LÓGICA DE UPLOAD PARA O ADMINISTRADOR ===
        window.handleImageUpload = async function(event) {
            const files = Array.from(event.target.files);
            if(files.length === 0) return;

            const clientEmail = document.getElementById('target-client-email').value;
            if(!clientEmail) {
                window.showToast('Por favor, informe o e-mail do cliente destino.', 'error');
                return;
            }

            // Ordenação Alfanumérica Avançada (Ex: 1, 2, 10, A, B)
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

            window.showToast(`Processando e ordenando ${files.length} imagens...`, 'info');
            const btnUpload = document.getElementById('btn-upload-label');
            btnUpload.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i> Enviando...';
            btnUpload.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const newImages = [];
                // Para o Canvas funcionar perfeitamente sem risco de regras do Firebase bloquearem, 
                // criamos as URLs locais para a sessão. Num app real, você faria o upload via Firebase Storage.
                
                for (let file of files) {
                    // Lógica para ler e exibir localmente
                    const reader = new FileReader();
                    const dataUrl = await new Promise(resolve => {
                        reader.onload = e => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                    newImages.push({ name: file.name, url: dataUrl });

                    // -- LÓGICA FIREBASE REAL (Pronta para uso quando o Storage estiver configurado) --
                    /* const storageRef = ref(storage, \`clientes/\${clientEmail}/apresentacao/\${file.name}\`);
                    await uploadBytes(storageRef, file);
                    const downloadURL = await getDownloadURL(storageRef);
                    newImages.push({ name: file.name, url: downloadURL }); 
                    */
                }

                // Salva no estado para renderizar imediatamente
                state.project.images = newImages; 
                
                // Exemplo de como você salvaria isso no Firestore:
                // await setDoc(doc(db, "projetos", clientEmail), { images: newImages }, { merge: true });

                window.renderApp();
                window.showToast('Imagens adicionadas com sucesso!', 'success');
            } catch (error) {
                console.error(error);
                window.showToast('Ocorreu um erro no upload.', 'error');
            } finally {
                btnUpload.innerHTML = '<i class="ph ph-upload-simple text-lg"></i> Adicionar Imagens';
                btnUpload.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function getDashboardTemplate() {
            const themeIcon = state.theme === 'light' ? 'ph-moon' : 'ph-sun';
            const badgeAdmin = state.isAdmin ? `<span class="bg-brand-500 text-white text-[9px] px-1.5 py-0.5 rounded ml-2 font-bold uppercase tracking-wider">Admin</span>` : '';

            return `
                <nav class="fixed bottom-0 w-full md:w-64 md:h-[100dvh] bg-white dark:bg-dark-900 md:border-r border-t md:border-t-0 border-zinc-200 dark:border-dark-700 z-50 flex flex-row md:flex-col justify-between md:justify-start pb-safe md:pb-0 transition-colors">
                    <div class="hidden md:flex items-center gap-3 p-6 border-b border-zinc-200 dark:border-dark-700">
                        <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                            <i class="ph ph-bezier-curve text-white text-xl"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm text-zinc-900 dark:text-white leading-tight uppercase tracking-widest">Estúdio</p>
                            <p class="text-[10px] text-brand-500 font-bold uppercase">Área VIP</p>
                        </div>
                    </div>

                    <div class="flex flex-row md:flex-col w-full px-1 py-1 md:px-4 md:py-6 gap-1 md:gap-2">
                        ${getNavButton('dashboard', 'Visão Geral', 'ph-squares-four')}
                        ${getNavButton('arquivos', 'Arquivos', 'ph-folder')}
                        ${getNavButton('revisoes', 'Revisões', 'ph-chats-circle')}
                    </div>

                    <div class="hidden md:block mt-auto p-4 border-t border-zinc-200 dark:border-dark-700">
                        <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-dark-800 transition-colors cursor-pointer group" onclick="window.logout()">
                            <div class="w-9 h-9 rounded-full bg-zinc-100 dark:bg-dark-900 border border-zinc-200 dark:border-dark-700 flex items-center justify-center group-hover:border-brand-500 transition-colors">
                                <span class="text-xs font-bold text-zinc-600 dark:text-zinc-300 group-hover:text-brand-500">${state.user.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <p class="text-sm font-medium text-zinc-900 dark:text-white truncate flex items-center">${state.user.name} ${badgeAdmin}</p>
                                <p class="text-xs text-zinc-500 truncate group-hover:text-red-500 dark:group-hover:text-red-400 transition-colors">Sair da conta</p>
                            </div>
                            <i class="ph ph-sign-out text-zinc-400 dark:text-zinc-500 group-hover:text-red-500 dark:group-hover:text-red-400"></i>
                        </div>
                    </div>
                </nav>

                <main class="flex-1 md:ml-64 w-full min-h-[100dvh] flex flex-col bg-zinc-50 dark:bg-dark-900 relative transition-colors">
                    <header class="h-16 md:h-20 border-b border-zinc-200 dark:border-dark-700 px-4 md:px-8 flex items-center justify-between sticky top-0 bg-white/90 dark:bg-dark-900/90 backdrop-blur-lg z-40">
                        
                        <div class="flex items-center gap-3 md:hidden" onclick="window.logout()">
                             <div class="w-8 h-8 rounded-full bg-zinc-100 dark:bg-dark-800 border border-zinc-200 dark:border-dark-700 flex items-center justify-center">
                                <span class="text-[10px] font-bold text-zinc-700 dark:text-zinc-300">${state.user.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-xs font-semibold text-zinc-900 dark:text-white leading-tight flex items-center gap-1">Olá, ${state.user.name.split('.')[0]} ${badgeAdmin}</span>
                                <span class="text-[10px] text-red-500 dark:text-red-400">Sair</span>
                            </div>
                        </div>
                        
                        <div class="hidden md:block">
                            <h2 class="text-xl font-bold text-zinc-900 dark:text-white tracking-tight" id="header-title-desk">Visão Geral</h2>
                            <p class="text-xs text-zinc-500 dark:text-zinc-400 mt-0.5">Acompanhe a evolução do seu projeto.</p>
                        </div>

                        <div class="flex items-center gap-2 md:gap-4">
                            <button onclick="window.toggleTheme()" class="w-10 h-10 rounded-full bg-zinc-100 md:bg-transparent dark:bg-dark-800 dark:md:bg-transparent border border-transparent md:border-zinc-200 dark:md:border-dark-700 flex items-center justify-center text-zinc-500 dark:text-zinc-400 hover:text-brand-600 dark:hover:text-white active:scale-90 transition-all" title="Alternar Tema">
                                <i class="ph-fill ${themeIcon} text-lg"></i>
                            </button>

                            <button onclick="window.showToast('Sem novas notificações.')" class="w-10 h-10 rounded-full bg-zinc-100 md:bg-transparent dark:bg-dark-800 dark:md:bg-transparent border border-transparent md:border-zinc-200 dark:md:border-dark-700 flex items-center justify-center text-zinc-500 dark:text-zinc-400 hover:text-brand-600 dark:hover:text-white active:scale-90 transition-all relative">
                                <i class="ph ph-bell text-lg"></i>
                                <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-brand-500 rounded-full border border-white dark:border-dark-800"></span>
                            </button>
                            
                            <a href="#" class="flex items-center justify-center gap-2 text-sm font-medium text-brand-600 dark:text-white bg-brand-50 dark:bg-brand-500/10 hover:bg-brand-100 dark:hover:bg-brand-500/20 px-3 md:px-4 py-2 md:py-2.5 rounded-full border border-brand-200 dark:border-brand-500/20 active:scale-95 transition-all">
                                <i class="ph-fill ph-whatsapp-logo text-brand-500 text-lg"></i>
                                <span class="hidden md:block">Falar com Designer</span>
                            </a>
                        </div>
                    </header>

                    <div id="main-content" class="p-4 md:p-8 max-w-6xl mx-auto w-full flex-1 pb-24 md:pb-8 fade-in"></div>
                </main>
            `;
        }

        function getNavButton(id, label, icon) {
            const isActive = state.currentTab === id;
            const baseClass = "flex-1 md:flex-none flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 py-2 md:py-3.5 px-1 md:px-4 rounded-xl transition-all md:w-full select-none";
            const activeClass = isActive 
                ? "text-brand-600 bg-brand-50 md:border md:border-brand-200 dark:text-brand-500 dark:bg-brand-500/10 dark:md:border-brand-500/20" 
                : "text-zinc-500 hover:text-zinc-900 hover:bg-zinc-50 dark:text-zinc-500 dark:hover:text-zinc-300 dark:active:bg-dark-800";
            const iconClass = isActive ? "ph-fill" : "";

            return `
                <button onclick="window.changeTab('${id}')" class="${baseClass} ${activeClass}">
                    <i class="ph ${icon} text-[22px] md:text-xl ${iconClass}"></i>
                    <span class="text-[10px] md:text-sm font-medium md:font-semibold leading-none">${label}</span>
                </button>
            `;
        }

        function renderMainContent() {
            const container = document.getElementById('main-content');
            const headerTitleDesk = document.getElementById('header-title-desk');
            
            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            const titles = { 'dashboard': 'Visão Geral do Projeto', 'arquivos': 'Meus Arquivos', 'revisoes': 'Centro de Revisões' };
            if(headerTitleDesk) headerTitleDesk.innerText = titles[state.currentTab];

            let mobileTitleHTML = `<h2 class="text-xl font-bold text-zinc-900 dark:text-white mb-4 md:hidden">${titles[state.currentTab]}</h2>`;

            switch(state.currentTab) {
                case 'dashboard': container.innerHTML = mobileTitleHTML + getOverviewContent(); break;
                case 'arquivos': container.innerHTML = mobileTitleHTML + getFilesContent(); break;
                case 'revisoes': container.innerHTML = mobileTitleHTML + `<div class="text-center py-16 md:py-24 px-4 bg-white dark:bg-dark-800/30 rounded-2xl border border-zinc-200 dark:border-dark-700/50 shadow-sm dark:shadow-none"><i class="ph ph-paint-brush text-5xl md:text-6xl text-zinc-300 dark:text-zinc-700 mb-4"></i><h3 class="text-lg md:text-xl text-zinc-900 dark:text-white font-medium mb-2">Sem revisões pendentes</h3><p class="text-sm text-zinc-500 dark:text-zinc-400 max-w-sm mx-auto">Sua etapa atual está aguardando ação na aba Visão Geral.</p></div>`; break;
            }
        }

        function getOverviewContent() {
            
            // --- BLOCO ADMINISTRADOR (Visível apenas para o E-mail Admin) ---
            let adminUploadUI = '';
            if (state.isAdmin) {
                adminUploadUI = `
                    <div class="glass-panel border border-brand-500/30 rounded-2xl p-5 md:p-6 mb-8 bg-brand-50 dark:bg-brand-500/10">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="ph-fill ph-crown text-brand-500 text-xl"></i>
                            <h4 class="text-lg font-bold text-zinc-900 dark:text-white">Painel do Administrador</h4>
                        </div>
                        <p class="text-sm text-zinc-600 dark:text-zinc-400 mb-5">Faça o upload de múltiplas imagens para a apresentação. O sistema as organizará numericamente e alfabeticamente de forma automática.</p>
                        
                        <div class="flex flex-col md:flex-row gap-4 items-end">
                            <div class="flex-1 w-full relative">
                                <label class="block text-xs font-semibold text-zinc-600 dark:text-zinc-400 mb-1.5 uppercase tracking-wide">E-mail do Cliente (Destino)</label>
                                <i class="ph ph-user absolute left-4 bottom-3.5 text-zinc-400 dark:text-zinc-500 text-lg"></i>
                                <input type="email" id="target-client-email" placeholder="cliente@email.com" class="w-full bg-white dark:bg-dark-900 border border-zinc-300 dark:border-dark-700 text-zinc-900 dark:text-white rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm shadow-sm dark:shadow-none">
                            </div>
                            
                            <label for="image-upload-input" id="btn-upload-label" class="cursor-pointer bg-brand-500 hover:bg-brand-600 text-white w-full md:w-auto px-6 py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2 transition-all active:scale-95 shadow-md shadow-brand-500/20 whitespace-nowrap">
                                <i class="ph ph-upload-simple text-lg"></i> Adicionar Imagens
                            </label>
                            <!-- Input File Escondido, aceita múltiplos arquivos -->
                            <input type="file" id="image-upload-input" multiple accept="image/*" class="hidden" onchange="window.handleImageUpload(event)">
                        </div>
                    </div>
                `;
            }

            // --- GRID DE IMAGENS ---
            let gridImagens = '';
            if (state.project.images && state.project.images.length > 0) {
                // Se houver imagens carregadas no state
                state.project.images.forEach((img, index) => {
                    gridImagens += `
                        <div class="bg-zinc-100 dark:bg-dark-800 border border-zinc-200 dark:border-dark-700 rounded-xl overflow-hidden group cursor-pointer aspect-square relative transition-transform hover:scale-[1.02] shadow-sm" onclick="window.verConceitoFull('${img.url}')">
                            <img src="${img.url}" alt="${img.name}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 flex items-end p-2 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="text-[10px] md:text-xs text-white font-medium truncate w-full">${img.name}</span>
                            </div>
                            <div class="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
                                <i class="ph ph-arrows-out text-white text-xs"></i>
                            </div>
                        </div>
                    `;
                });
            } else {
                // Estado Vazio (Placeholders indicando onde as imagens ficarão)
                gridImagens = `
                    <div class="col-span-2 sm:col-span-3 md:col-span-4 lg:col-span-5 text-center py-12 md:py-20 border-2 border-dashed border-zinc-200 dark:border-dark-700 rounded-2xl">
                        <i class="ph ph-image text-4xl text-zinc-300 dark:text-dark-600 mb-3"></i>
                        <p class="text-zinc-500 dark:text-zinc-400 font-medium">As imagens da apresentação aparecerão aqui.</p>
                        ${state.isAdmin ? '<p class="text-xs text-brand-500 mt-2">Use o painel acima para enviar as imagens.</p>' : ''}
                    </div>
                `;
            }

            return `
                ${adminUploadUI} <!-- Injecão do Painel Admin, se autorizado -->

                <div class="glass-panel rounded-2xl md:rounded-3xl p-5 md:p-8 mb-6 md:mb-8 relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-48 h-48 bg-brand-500/10 rounded-full blur-3xl pointer-events-none"></div>
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-8 relative z-10">
                        <div class="w-full">
                            <div class="flex items-center justify-between md:justify-start gap-3 mb-2 md:mb-3">
                                <span class="px-2.5 py-1 rounded-md bg-brand-50 dark:bg-brand-500/15 border border-brand-200 dark:border-brand-500/30 text-brand-600 dark:text-brand-500 text-[10px] font-bold uppercase tracking-wider">Ativo</span>
                                <span class="md:hidden text-xs text-zinc-500 dark:text-zinc-400 font-medium">Prazo: ${state.project.deadline}</span>
                            </div>
                            <h3 class="text-xl md:text-3xl font-bold text-zinc-900 dark:text-white tracking-tight mb-1">${state.project.name}</h3>
                            <p class="hidden md:flex text-sm text-zinc-500 dark:text-zinc-400 items-center gap-1.5"><i class="ph ph-calendar-blank"></i> Prazo estimado: <span class="text-zinc-700 dark:text-zinc-200 font-medium">${state.project.deadline}</span></p>
                        </div>
                        <div class="w-full md:w-auto md:text-right bg-zinc-50 dark:bg-dark-900 md:bg-transparent p-4 md:p-0 rounded-xl md:rounded-none border border-zinc-200 dark:border-dark-700 md:border-none">
                            <div class="flex justify-between md:justify-end items-center mb-2 md:mb-1.5">
                                <p class="text-xs md:text-sm text-zinc-500 dark:text-zinc-400 font-medium">Progresso Geral</p>
                                <span class="text-sm md:text-base text-zinc-900 dark:text-white font-bold md:hidden">${state.project.progress}%</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-full md:w-48 h-2 bg-zinc-200 dark:bg-dark-800 rounded-full overflow-hidden border border-zinc-300 dark:border-dark-700">
                                    <div class="h-full bg-brand-500 rounded-full w-[${state.project.progress}%] shadow-[0_0_10px_rgba(20,184,166,0.6)]"></div>
                                </div>
                                <span class="hidden md:block text-zinc-900 dark:text-white font-bold">${state.project.progress}%</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-between items-start relative z-10 px-1">
                        <div class="absolute top-[14px] md:top-5 left-[10%] right-[10%] h-[2px] bg-zinc-200 dark:bg-dark-700 -z-10"></div>
                        <div class="absolute top-[14px] md:top-5 left-[10%] w-[50%] h-[2px] bg-brand-500 -z-10 shadow-[0_0_8px_rgba(20,184,166,0.6)]"></div>
                        ${state.project.stages.map((stage, index) => {
                            let isPast = index < state.project.currentStage;
                            let isCurrent = index === state.project.currentStage;
                            
                            let bgClass = isPast 
                                ? "bg-brand-50 border-brand-500 text-brand-600 dark:bg-brand-500/20 dark:text-brand-500" 
                                : isCurrent 
                                ? "bg-brand-500 border-brand-500 text-white shadow-[0_0_15px_rgba(20,184,166,0.4)]" 
                                : "bg-zinc-50 border-zinc-300 text-zinc-400 dark:bg-dark-900 dark:border-dark-700 dark:text-zinc-600";
                                
                            let icon = isPast ? "ph-check" : isCurrent ? "ph-spinner-gap animate-spin" : "ph-circle";
                            let textClass = (isPast || isCurrent) ? "text-zinc-800 dark:text-zinc-200 font-semibold" : "text-zinc-400 dark:text-zinc-500 font-medium";
                            
                            return `
                                <div class="flex flex-col items-center gap-1.5 md:gap-2 relative bg-transparent w-16 md:w-24">
                                    <div class="w-7 h-7 md:w-10 md:h-10 rounded-full border-2 flex items-center justify-center transition-all ${bgClass}">
                                        <i class="ph ${icon} text-sm md:text-lg ${isPast ? 'ph-fill' : ''}"></i>
                                    </div>
                                    <span class="text-[9px] md:text-xs text-center uppercase tracking-wider break-words w-full ${textClass}">${stage}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div class="mb-4">
                    <div class="flex items-center justify-between mb-4 md:mb-6">
                        <h4 class="text-base md:text-lg font-bold text-zinc-900 dark:text-white flex items-center gap-2"><i class="ph-fill ph-presentation-chart text-brand-500"></i> Apresentação do Projeto</h4>
                        <span class="text-[10px] md:text-xs font-bold text-brand-600 dark:text-brand-500 bg-brand-50 dark:bg-brand-500/10 px-2.5 py-1 rounded-md uppercase">Aguardando Avaliação</span>
                    </div>
                    <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-6">Confira abaixo todos os entregáveis e aplicações criadas para a sua nova marca. Role até o final para aprovar.</p>
                    
                    <!-- GALERIA RENDERIZADA DINAMICAMENTE -->
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4 mb-10">
                        ${gridImagens}
                    </div>
                    
                    <div class="border border-brand-200 dark:border-brand-500/30 rounded-2xl md:rounded-3xl p-6 md:p-10 flex flex-col items-center justify-center text-center bg-brand-50 dark:bg-brand-500/5 mt-8 shadow-sm dark:shadow-lg">
                        <div class="w-14 h-14 md:w-16 md:h-16 rounded-full bg-brand-100 dark:bg-brand-500/20 flex items-center justify-center mb-4 border border-brand-200 dark:border-brand-500/30">
                            <i class="ph-fill ph-thumbs-up text-2xl md:text-3xl text-brand-600 dark:text-brand-500"></i>
                        </div>
                        <h5 class="font-bold text-zinc-900 dark:text-white text-lg md:text-xl mb-2">O que achou do resultado?</h5>
                        <p class="text-sm md:text-base text-zinc-600 dark:text-zinc-400 mb-8 max-w-md">Após visualizar todos os itens acima, caso o projeto atenda às suas expectativas, clique em aprovar para iniciarmos a preparação dos seus arquivos finais.</p>
                        <div class="flex flex-col sm:flex-row gap-3 md:gap-4 w-full max-w-lg justify-center">
                            <button onclick="window.showToast('Aprovado! Preparando arquivos finais.', 'success')" class="w-full sm:w-auto px-8 py-4 bg-brand-500 text-white text-sm md:text-base font-bold rounded-xl active:scale-95 transition-all shadow-[0_0_20px_rgba(20,184,166,0.3)] hover:shadow-[0_0_30px_rgba(20,184,166,0.5)] flex items-center justify-center gap-2">
                                <i class="ph ph-check-circle text-xl"></i> Aprovar Projeto
                            </button>
                            <button onclick="window.changeTab('revisoes')" class="w-full sm:w-auto px-8 py-4 bg-white dark:bg-dark-800 text-zinc-700 dark:text-white text-sm md:text-base font-semibold rounded-xl active:scale-95 transition-all border border-zinc-200 dark:border-dark-600 hover:bg-zinc-50 dark:hover:bg-dark-700 flex items-center justify-center gap-2 shadow-sm dark:shadow-none">
                                <i class="ph ph-pencil-simple text-xl"></i> Solicitar Ajuste
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getFilesContent() {
            const files = [
                { name: "Logo_Principal.ai", size: "2.4 MB", ext: "AI", icon: "ph-bezier-curve", color: "text-orange-500", bg: "bg-orange-50 dark:bg-orange-500/10", available: false },
                { name: "PNGs_Alta_Res.zip", size: "18.5 MB", ext: "ZIP", icon: "ph-file-archive", color: "text-blue-500", bg: "bg-blue-50 dark:bg-blue-500/10", available: false },
                { name: "Manual_Marca.pdf", size: "12.1 MB", ext: "PDF", icon: "ph-file-pdf", color: "text-red-500", bg: "bg-red-50 dark:bg-red-500/10", available: false },
                { name: "Apresentacao_v1.pdf", size: "8.4 MB", ext: "PDF", icon: "ph-file-pdf", color: "text-red-500", bg: "bg-red-50 dark:bg-red-500/10", available: true },
            ];

            return `
                <div class="glass-panel rounded-2xl md:rounded-3xl p-1 mb-6 overflow-hidden">
                    <div class="p-4 md:p-8 bg-white dark:bg-dark-900 rounded-[12px] md:rounded-[22px]">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <div>
                                <h3 class="text-lg md:text-xl font-bold text-zinc-900 dark:text-white mb-0.5">Pacote de Entrega</h3>
                                <p class="text-xs md:text-sm text-zinc-500 dark:text-zinc-400">Arquivos finais liberados após aprovação.</p>
                            </div>
                            <button class="w-full md:w-auto bg-zinc-50 dark:bg-dark-800 border border-zinc-200 dark:border-dark-700 text-zinc-400 px-4 py-3 rounded-xl text-sm font-medium flex items-center justify-center gap-2 opacity-60 cursor-not-allowed">
                                <i class="ph ph-download-simple text-lg"></i> Baixar Tudo
                            </button>
                        </div>
                        <div class="flex flex-col gap-2.5">
                            ${files.map(file => `
                                <div class="flex items-center justify-between p-3 md:p-4 rounded-xl border border-zinc-100 dark:border-dark-700 bg-zinc-50 dark:bg-dark-800/40 ${file.available ? 'active:bg-zinc-100 dark:active:bg-dark-800 cursor-pointer' : 'opacity-60'} transition-colors" onclick="${file.available ? 'window.showToast(\'Download iniciado.\')' : 'window.showToast(\'Bloqueado na fase atual.\', \'info\')'}">
                                    <div class="flex items-center gap-3 md:gap-4 overflow-hidden">
                                        <div class="shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-lg ${file.bg} flex items-center justify-center">
                                            <i class="ph-fill ${file.icon} text-xl md:text-2xl ${file.color}"></i>
                                        </div>
                                        <div class="min-w-0">
                                            <p class="font-semibold text-sm md:text-base text-zinc-900 dark:text-zinc-200 truncate pr-2">${file.name}</p>
                                            <div class="flex items-center gap-2 text-[10px] md:text-xs mt-0.5">
                                                <span class="text-zinc-500 font-medium">${file.size}</span>
                                                <span class="w-1 h-1 rounded-full bg-zinc-300 dark:bg-dark-600"></span>
                                                ${file.available ? '<span class="text-brand-600 dark:text-brand-500 font-semibold flex items-center gap-1"><i class="ph-fill ph-check-circle"></i> Liberado</span>' : '<span class="text-zinc-400 dark:text-zinc-500 flex items-center gap-1"><i class="ph-fill ph-lock-key"></i> Bloqueado</span>'}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="shrink-0 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center ${file.available ? 'bg-zinc-200 dark:bg-dark-700 text-zinc-700 dark:text-white' : 'text-zinc-400 dark:text-zinc-600'}">
                                        <i class="ph ${file.available ? 'ph-download-simple' : 'ph-lock-key'} text-base md:text-lg"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
