<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Portal do Cliente | Wa Comercial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a',
                        },
                        dark: {
                            900: '#09090b', 800: '#18181b', 700: '#27272a', 600: '#3f3f46'
                        }
                    },
                    spacing: {
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fafafa;
            color: #18181b;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .dark .glass-panel {
            background: rgba(24, 24, 27, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }

        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
        .pt-safe { padding-top: env(safe-area-inset-top); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #toast-container {
            position: fixed;
            bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }
        .toast {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            color: #18181b;
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }
        .dark .toast {
            background: #18181b;
            border: 1px solid #27272a;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.8);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast.fade-out { animation: fadeOutDown 0.3s forwards; }
        @keyframes fadeOutDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }

        /* Animações Galeria */
        .slide-left { animation: slideLeft 0.3s ease-out forwards; }
        .slide-right { animation: slideRight 0.3s ease-out forwards; }
        @keyframes slideLeft { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="overflow-x-hidden bg-zinc-50 dark:bg-dark-900 text-zinc-900 dark:text-zinc-100 selection:bg-brand-500 selection:text-white transition-colors duration-300">

    <div id="app" class="min-h-[100dvh] w-full flex flex-col md:flex-row pt-safe"></div>
    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUWJKs_LspaznsFak_WsSmYNQobNBiflU",
            authDomain: "members-b4a99.firebaseapp.com",
            projectId: "members-b4a99",
            storageBucket: "members-b4a99.firebasestorage.app",
            messagingSenderId: "220098403439",
            appId: "1:220098403439:web:f4bb423d098caca887c19a",
            measurementId: "G-G7CQ4XWRYL"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);

        const ADMIN_EMAIL = "admin@empresa.com"; 

        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#09090b');
        }

        const state = {
            isLoggedIn: false,
            isAdmin: false,
            currentTab: 'dashboard',
            theme: savedTheme,
            user: { name: "", email: "" },
            project: {
                name: "Identidade Visual",
                deadline: "15/05/2026",
                progress: 65,
                currentStage: 2,
                stages: ["Briefing", "Conceitos", "Ajustes", "Arquivos"],
                approved: false,
                images: [],
                deliveryFiles: [],
                revisoes: [],
                downloadedImages: [] // Novo campo para rastrear downloads das imagens
            },
            allClients: [], // Para o painel Admin
            galleryIndex: 0, // Para navegação de imagens
            adminSelectedClientForRevision: null // Estado do Admin para o Chat
        };

        // --- COMPRESSÃO DE IMAGENS ---
        async function compressImage(file, maxWidth = 1200) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        // --- FETCH DADOS DO CLIENTE ---
        async function fetchClientData(emailToFetch) {
            try {
                // Obter status do projeto, ficheiros e revisões
                const docRef = doc(db, "projetos", emailToFetch);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    state.project.approved = docSnap.data().approved || false;
                    state.project.deliveryFiles = docSnap.data().deliveryFiles || [];
                    state.project.revisoes = docSnap.data().revisoes || [];
                    state.project.downloadedImages = docSnap.data().downloadedImages || [];
                } else {
                    state.project.approved = false;
                    state.project.deliveryFiles = [];
                    state.project.revisoes = [];
                    state.project.downloadedImages = [];
                }

                // Obter imagens
                const imgsRef = collection(db, "projetos", emailToFetch, "imagens_apresentacao");
                const snapshot = await getDocs(imgsRef);
                const loadedImages = snapshot.docs.map(doc => doc.data());
                loadedImages.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
                state.project.images = loadedImages;

            } catch (error) {
                console.error("Erro ao buscar dados do Firebase:", error);
                state.project.images = [];
                state.project.deliveryFiles = [];
                state.project.revisoes = [];
                state.project.downloadedImages = [];
            }
        }

        // --- FETCH TODOS OS CLIENTES (ADMIN) ---
        async function fetchAllClients() {
            try {
                const snapshot = await getDocs(collection(db, "projetos"));
                state.allClients = snapshot.docs.map(doc => ({
                    email: doc.id,
                    ...doc.data()
                }));
            } catch (error) {
                console.error("Erro ao buscar lista de clientes:", error);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                state.isLoggedIn = true;
                state.user.email = user.email;
                state.user.name = user.email.split('@')[0];
                state.isAdmin = (user.email === ADMIN_EMAIL);
                
                if (!state.isAdmin) {
                    await fetchClientData(user.email);
                } else {
                    await fetchAllClients();
                    state.project.images = [];
                }
                
                window.renderApp();
            } else {
                state.isLoggedIn = false;
                state.isAdmin = false;
                state.project.images = [];
                window.renderApp();
            }
        });

        // --- UTILITÁRIOS GLOBAIS ---
        window.toggleTheme = function() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', state.theme);
            if (state.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#09090b');
            } else {
                document.documentElement.classList.remove('dark');
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#fafafa');
            }
            window.renderApp(); 
        }

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-brand-500 text-2xl"></i>' : (type === 'error' ? '<i class="ph-fill ph-warning-circle text-red-500 text-2xl"></i>' : '<i class="ph-fill ph-info text-blue-500 text-2xl"></i>');
            toast.className = 'toast w-full';
            toast.innerHTML = `${icon} <span class="font-medium text-sm flex-1">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.changeTab = function(tabId) {
            if(state.currentTab === tabId) return;
            state.currentTab = tabId;
            window.renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.logout = async function() {
            try {
                await signOut(auth);
                window.showToast('Terminou a sessão com sucesso.', 'info');
            } catch (error) {
                window.showToast('Erro ao sair da conta.', 'error');
            }
        }

        window.renderApp = function() {
            const app = document.getElementById('app');
            if (!state.isLoggedIn) {
                app.innerHTML = getLoginTemplate();
                setupLoginListeners();
            } else {
                app.innerHTML = getDashboardTemplate();
                renderMainContent();
            }
        }

        // --- LÓGICA ADMIN: SELECIONAR CLIENTE NA ABA REVISÕES ---
        window.selectClientForRevision = async function(email) {
            state.adminSelectedClientForRevision = email;
            window.showToast("A carregar histórico do cliente...", "info");
            await fetchClientData(email);
            window.renderApp();
        }

        // --- GALERIA DE IMAGENS E DOWNLOAD (SWIPE E TECLADO) ---
        window.verConceitoFull = function(index) {
            state.galleryIndex = index;
            renderGalleryModal();
        }

        window.baixarImagemAtual = async function(index) {
            const img = state.project.images[index];
            if(!img) return;

            // 1. Iniciar o Download Fisicamente no dispositivo
            const link = document.createElement('a');
            link.href = img.url;
            link.download = img.name || 'imagem_wacomercial.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 2. Gravar o status "Download Realizado" no Firestore
            let clientEmail = state.isAdmin ? (state.adminSelectedClientForRevision || document.getElementById('target-client-email')?.value) : state.user.email;
            
            if(clientEmail) {
                try {
                    const docRef = doc(db, "projetos", clientEmail.trim().toLowerCase());
                    const docSnap = await getDoc(docRef);
                    let downloaded = [];
                    
                    if(docSnap.exists() && docSnap.data().downloadedImages) {
                        downloaded = docSnap.data().downloadedImages;
                    }
                    
                    if(!downloaded.includes(img.name)) {
                        downloaded.push(img.name);
                        await setDoc(docRef, { downloadedImages: downloaded }, { merge: true });
                        
                        // Atualizar o estado local se o projeto for o que está aberto
                        state.project.downloadedImages = downloaded;
                        window.renderApp(); // Atualiza a galeria por trás para mostrar o badge
                    }
                    
                    window.showToast("Download realizado e gravado no sistema!", "success");
                    
                    // Atualiza o visual do botão no modal temporariamente
                    const btn = document.getElementById('btn-download-modal');
                    if(btn) {
                        btn.innerHTML = '<i class="ph-bold ph-check text-xl"></i> Baixada com sucesso';
                        btn.classList.replace('bg-brand-500', 'bg-emerald-500');
                        btn.classList.replace('hover:bg-brand-600', 'hover:bg-emerald-600');
                        btn.classList.replace('shadow-brand-500/30', 'shadow-emerald-500/30');
                    }

                } catch (error) {
                    console.error("Erro ao registar download:", error);
                }
            }
        }

        function renderGalleryModal() {
            let modal = document.getElementById('gallery-modal');
            if(!modal) {
                modal = document.createElement('div');
                modal.id = 'gallery-modal';
                modal.className = "fixed inset-0 z-[999] bg-black/95 flex items-center justify-center fade-in touch-none flex-col";
                document.body.appendChild(modal);
                
                // Lógica de Swiping (Mobile)
                let touchstartX = 0;
                let touchendX = 0;
                modal.addEventListener('touchstart', e => { 
                    if(e.target.closest('button')) return; // Ignora swipe se tocar no botão
                    touchstartX = e.changedTouches[0].screenX; 
                });
                modal.addEventListener('touchend', e => {
                    if(e.target.closest('button')) return;
                    touchendX = e.changedTouches[0].screenX;
                    handleSwipe();
                });

                function handleSwipe() {
                    const threshold = 50;
                    if (touchendX < touchstartX - threshold) window.nextImage(); // Swipe Esquerda
                    if (touchendX > touchstartX + threshold) window.prevImage(); // Swipe Direita
                }
            }

            const img = state.project.images[state.galleryIndex];
            const isDownloaded = state.project.downloadedImages && state.project.downloadedImages.includes(img.name);
            
            // Estilos dinâmicos do botão baseados em se já foi baixada
            const btnStyles = isDownloaded 
                ? "bg-emerald-500 hover:bg-emerald-600 shadow-emerald-500/30" 
                : "bg-brand-500 hover:bg-brand-600 shadow-brand-500/30";
            const btnIcon = isDownloaded ? "ph-check" : "ph-download-simple";
            const btnText = isDownloaded ? "Baixada com sucesso" : "Baixar Imagem";

            modal.innerHTML = `
                <button onclick="window.closeGallery()" class="absolute top-4 right-4 md:top-8 md:right-8 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition-colors z-50 backdrop-blur-md">
                    <i class="ph ph-x text-2xl"></i>
                </button>
                
                <!-- Setas de Navegação -->
                <button onclick="window.prevImage()" class="absolute left-2 md:left-8 top-1/2 -translate-y-1/2 w-12 h-12 md:w-16 md:h-16 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-white transition-colors z-50 backdrop-blur-md ${state.galleryIndex === 0 ? 'opacity-30 cursor-not-allowed' : ''}">
                    <i class="ph ph-caret-left text-2xl md:text-4xl"></i>
                </button>
                
                <button onclick="window.nextImage()" class="absolute right-2 md:right-8 top-1/2 -translate-y-1/2 w-12 h-12 md:w-16 md:h-16 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-white transition-colors z-50 backdrop-blur-md ${state.galleryIndex === state.project.images.length - 1 ? 'opacity-30 cursor-not-allowed' : ''}">
                    <i class="ph ph-caret-right text-2xl md:text-4xl"></i>
                </button>

                <div class="relative w-full h-full flex flex-col items-center justify-center p-4 md:p-12 pb-24 md:pb-32" id="gallery-img-container">
                    <img src="${img.url}" class="max-w-7xl max-h-[75vh] object-contain rounded-lg shadow-2xl slide-right" id="gallery-image">
                    
                    <!-- Botão de Download abaixo da imagem -->
                    <div class="mt-6 md:mt-8 fade-in">
                        <button id="btn-download-modal" onclick="window.baixarImagemAtual(${state.galleryIndex})" class="flex items-center gap-2 ${btnStyles} text-white px-8 py-3.5 rounded-xl font-bold shadow-lg transition-transform active:scale-95 text-sm md:text-base">
                            <i class="ph-bold ${btnIcon} text-xl"></i> ${btnText}
                        </button>
                    </div>
                </div>
                
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white/70 text-sm font-medium bg-black/50 px-4 py-2 rounded-full backdrop-blur-md">
                    ${state.galleryIndex + 1} / ${state.project.images.length}
                </div>
            `;
        }

        window.nextImage = function() {
            if (state.galleryIndex < state.project.images.length - 1) {
                state.galleryIndex++;
                renderGalleryModal();
                const imgEl = document.getElementById('gallery-image');
                if(imgEl) imgEl.classList.replace('slide-right', 'slide-left');
            }
        }

        window.prevImage = function() {
            if (state.galleryIndex > 0) {
                state.galleryIndex--;
                renderGalleryModal();
            }
        }

        window.closeGallery = function() {
            const modal = document.getElementById('gallery-modal');
            if(modal) modal.remove();
        }

        // Teclado para a Galeria
        document.addEventListener('keydown', e => {
            if (document.getElementById('gallery-modal')) {
                if (e.key === 'ArrowRight') window.nextImage();
                if (e.key === 'ArrowLeft') window.prevImage();
                if (e.key === 'Escape') window.closeGallery();
            }
        });

        // --- LÓGICA DE APROVAÇÃO DO CLIENTE ---
        window.aprovarProjeto = async function() {
            if(state.isAdmin) {
                window.showToast("Administradores não podem aprovar pelos clientes.", "error");
                return;
            }
            try {
                window.showToast("A registar aprovação...", "info");
                await setDoc(doc(db, "projetos", state.user.email), { 
                    approved: true,
                    email: state.user.email,
                    approvedAt: new Date().toISOString()
                }, { merge: true });
                
                state.project.approved = true;
                window.showToast('Projeto Aprovado! Ficheiros finais desbloqueados.', 'success');
                // Redirecionamento automático após aprovar
                window.changeTab('arquivos');
            } catch (error) {
                console.error(error);
                window.showToast('Erro ao aprovar projeto. Tente novamente.', 'error');
            }
        }

        // --- LÓGICA DE REVISÕES / AJUSTES ---
        window.enviarRevisao = async function() {
            const textarea = document.getElementById('texto-revisao');
            if(!textarea) return;
            
            const texto = textarea.value.trim();
            if(!texto) {
                window.showToast('Escreva a sua solicitação antes de enviar.', 'error');
                return;
            }

            // Descobrir qual o email do cliente (Admin envia para o selecionado na aba Revisões, Cliente envia para o próprio)
            let clientEmail = '';
            if(state.isAdmin) {
                if(state.adminSelectedClientForRevision) {
                    clientEmail = state.adminSelectedClientForRevision;
                } else {
                    window.showToast('Selecione um cliente na lista primeiro.', 'error');
                    return;
                }
            } else {
                clientEmail = state.user.email;
            }

            window.showToast("A enviar mensagem...", "info");
            
            const novaRevisao = {
                texto: texto,
                data: new Date().toISOString(),
                autor: state.isAdmin ? 'Wa Comercial' : 'Cliente'
            };

            try {
                const docRef = doc(db, "projetos", clientEmail);
                const docSnap = await getDoc(docRef);
                
                let revisoes = [];
                if(docSnap.exists() && docSnap.data().revisoes) {
                    revisoes = docSnap.data().revisoes;
                }
                
                revisoes.push(novaRevisao);

                await setDoc(docRef, { revisoes: revisoes, email: clientEmail }, { merge: true });
                
                state.project.revisoes = revisoes;
                textarea.value = '';
                window.renderApp();
                window.showToast('Mensagem enviada com sucesso.', 'success');
            } catch (error) {
                console.error(error);
                window.showToast('Erro ao enviar mensagem.', 'error');
            }
        }

        // --- LÓGICA ADMIN: BUSCAR E FAZER UPLOAD ---
        window.loadClientImages = async function() {
            const clientEmail = document.getElementById('target-client-email').value.trim().toLowerCase();
            if(!clientEmail) {
                window.showToast('Escreva o e-mail do cliente para procurar.', 'error');
                return;
            }
            window.showToast('A procurar projeto...', 'info');
            await fetchClientData(clientEmail);
            window.renderApp();
            
            setTimeout(() => {
                const input = document.getElementById('target-client-email');
                if(input) input.value = clientEmail;
                window.showToast('Pesquisa concluída.', 'success');
            }, 50);
        }

        window.handleImageUpload = async function(event) {
            const files = Array.from(event.target.files);
            if(files.length === 0) return;
            const clientEmail = document.getElementById('target-client-email').value.trim().toLowerCase();
            if(!clientEmail) {
                window.showToast('Por favor, informe o e-mail do cliente destino.', 'error');
                return;
            }

            files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
            window.showToast(`A processar e enviar ${files.length} imagens...`, 'info');
            
            const btnUpload = document.getElementById('btn-upload-label');
            btnUpload.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i> A Enviar...';

            try {
                // Criação do documento pai caso não exista
                await setDoc(doc(db, "projetos", clientEmail), { email: clientEmail }, { merge: true });
                
                const imgsRef = collection(db, "projetos", clientEmail, "imagens_apresentacao");
                for (let file of files) {
                    const base64Data = await compressImage(file, 1200);
                    await setDoc(doc(imgsRef, file.name), { name: file.name, url: base64Data });
                }

                await fetchClientData(clientEmail);
                await fetchAllClients(); // Atualiza lista de aprovações
                window.renderApp();
                
                setTimeout(() => {
                    const input = document.getElementById('target-client-email');
                    if(input) input.value = clientEmail;
                }, 50);

                window.showToast('Imagens guardadas com sucesso na base de dados!', 'success');
            } catch (error) {
                console.error(error);
                window.showToast('Erro ao guardar. Verifique as Regras do Firestore.', 'error');
            } finally {
                btnUpload.innerHTML = '<i class="ph ph-upload-simple text-lg"></i> Adicionar Imagens';

        // --- LÓGICA ADMIN: ADICIONAR PACOTE DE ENTREGA (LINK) ---
        window.adicionarFicheiroEntrega = async function(e) {
            e.preventDefault();
            const clientEmail = document.getElementById('delivery-email').value.trim().toLowerCase();
            const name = document.getElementById('delivery-name').value;
            const link = document.getElementById('delivery-link').value;

            try {
                window.showToast("A adicionar ficheiro de entrega...", "info");
                
                const novoFicheiro = {
                    name: name,
                    url: link,
                    size: "Link Externo",
                    icon: "ph-file-zip",
                    color: "text-brand-500",
                    bg: "bg-brand-50 dark:bg-brand-500/10"
                };

                // Recuperar estado atual
                const docRef = doc(db, "projetos", clientEmail);
                const docSnap = await getDoc(docRef);
                let atuais = [];
                if(docSnap.exists() && docSnap.data().deliveryFiles) atuais = docSnap.data().deliveryFiles;
                
                atuais.push(novoFicheiro);

                await setDoc(docRef, { deliveryFiles: atuais, email: clientEmail }, { merge: true });
                window.showToast("Ficheiro adicionado com sucesso!", "success");
                
                // Se o admin está a ver o mesmo cliente, recarrega
                if(clientEmail === document.getElementById('delivery-email').value) {
                    await fetchClientData(clientEmail);
                    window.renderApp();
                }
            } catch (error) {
                console.error(error);
                window.showToast("Erro ao adicionar ficheiro.", "error");
            }
        }

                    const isAvailable = state.project.approved || state.isAdmin;

                    return `
                        <div class="flex items-center justify-between p-3 md:p-4 rounded-xl border border-zinc-100 dark:border-dark-700 bg-zinc-50 dark:bg-dark-800/40 ${isAvailable ? 'hover:bg-zinc-100 dark:hover:bg-dark-800' : 'opacity-60'} transition-colors">
                            <div class="flex items-center gap-3 md:gap-4 overflow-hidden">
                                <div class="shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-lg ${file.bg || 'bg-brand-50 dark:bg-brand-500/10'} flex items-center justify-center">
                                    <i class="ph-fill ${file.icon || 'ph-file-zip'} text-xl md:text-2xl ${file.color || 'text-brand-500'}"></i>
                                </div>
                                <div class="min-w-0">
                                    <p class="font-semibold text-sm md:text-base text-zinc-900 dark:text-zinc-200 truncate pr-2">${file.name}</p>
                                    <div class="flex items-center gap-2 text-[10px] md:text-xs mt-0.5">
                                        <span class="text-zinc-500 font-medium">${file.size || 'Link Nuvem'}</span>
                                        <span class="w-1 h-1 rounded-full bg-zinc-300 dark:bg-dark-600"></span>
                                        ${isAvailable 
                                            ? '<span class="text-brand-600 dark:text-brand-500 font-semibold flex items-center gap-1"><i class="ph-fill ph-check-circle"></i> Liberado</span>' 
                                            : '<span class="text-amber-600 dark:text-amber-500 flex items-center gap-1"><i class="ph-fill ph-lock-key"></i> Aguarda Aprovação</span>'}
                                    </div>
                                </div>
                            </div>
                            ${isAvailable ? `
                                <a href="${file.url}" target="_blank" onclick="window.showToast('Download iniciado/Abrindo Link.')" class="shrink-0 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center bg-zinc-200 dark:bg-dark-700 hover:bg-brand-500 hover:text-white text-zinc-700 dark:text-white transition-colors cursor-pointer">
                                    <i class="ph ph-download-simple text-base md:text-lg"></i>
                                </a>
                            ` : `
                                <div onclick="window.showToast('Tem de aprovar o projeto na Visão Geral para libertar os ficheiros.', 'error')" class="shrink-0 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center text-zinc-400 dark:text-zinc-600 cursor-not-allowed">
                                    <i class="ph-fill ph-lock-key text-base md:text-lg"></i>
                                </div>
                            `}
                        </div>
                    `;
                }).join('');
            } else {
                filesListHTML = `
                    <div class="text-center py-10">
                        <i class="ph ph-folder-open text-4xl text-zinc-300 dark:text-zinc-600 mb-2"></i>
                        <p class="text-sm text-zinc-500 dark:text-zinc-400">Nenhum pacote de entrega disponível ainda.</p>
                    </div>
                `;
            }

            return `
                ${adminUploadFileUI}
                <div class="glass-panel rounded-2xl md:rounded-3xl p-1 mb-6 overflow-hidden">
                    <div class="p-4 md:p-8 bg-white dark:bg-dark-900 rounded-[12px] md:rounded-[22px]">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <div>
                                <h3 class="text-lg md:text-xl font-bold text-zinc-900 dark:text-white mb-0.5">Pacote de Entrega</h3>
                                <p class="text-xs md:text-sm text-zinc-500 dark:text-zinc-400">Ficheiros finais libertados após aprovação visual.</p>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2.5">
                            ${filesListHTML}
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
